<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- 微信网页开发必备meta，解决音频播放限制 -->
    <meta name="referrer" content="no-referrer">
    <title>可以成为我的宝宝吗？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background-color: #fadadd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            transition: all 0.5s ease;
            touch-action: manipulation; /* 优化微信点击响应 */
        }
        .container {
            text-align: center;
            padding: 20px;
            transition: all 0.5s ease;
        }
        /* 图片样式 */
        .love-img {
            width: 220px;
            border-radius: 12px;
            margin-bottom: 35px;
            transition: all 0.5s ease;
        }
        /* 全屏哭哭图样式 */
        .cry-img-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background-color: #fadadd;
            display: none;
            z-index: 999;
        }
        .question {
            font-size: 24px;
            color: #333;
            margin-bottom: 40px;
        }
        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent; /* 去掉微信点击高亮 */
        }
        .btn-yes {
            background-color: #d9534f;
            color: white;
            font-size: 18px;
        }
        .btn-no {
            background-color: #428bca;
            color: white;
        }
        .success {
            display: none;
            font-size: 28px;
            color: #d9534f;
            font-weight: bold;
            margin-top: 20px;
        }
        /* 隐藏容器样式 */
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        /* 音乐控件（微信下强制隐藏，仅调试用） */
        audio {
            position: fixed;
            bottom: 20px;
            left: 20px;
            opacity: 0;
            z-index: 1000;
        }
        /* 可选：添加点击提示（首次打开微信显示） */
        .wechat-tip {
            position: fixed;
            top: 20px;
            color: #666;
            font-size: 14px;
            display: none; /* 默认隐藏，微信环境显示 */
        }
    </style>
</head>
<body>
    <!-- 微信点击提示（可选） -->
    <div class="wechat-tip" id="wechatTip">点击按钮即可播放音乐哦～</div>

    <!-- 同意音乐（GitHub链接） -->
    <audio id="yesMusic" loop preload="auto" x5-playsinline playsinline webkit-playsinline>
        <source src="https://raw.githubusercontent.com/sbkg123/love/main/123123.mp3" type="audio/mpeg">
    </audio>

    <!-- 拒绝音乐（GitHub链接） -->
    <audio id="noMusic" loop preload="auto" x5-playsinline playsinline webkit-playsinline>
        <source src="https://raw.githubusercontent.com/sbkg123/love/main/12341234.mp3" type="audio/mpeg">
    </audio>

    <!-- 初始容器 -->
    <div class="container" id="main">
        <img class="love-img" id="mainImg" src="https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/5e40fc94904d419fa3a724ba1dd602cc.jpeg~tplv-a9rns2rl98-24:720:720.jpeg?lk3s=8e244e95&rcl=20260426105345A86DEEB4EB76433EAF4F&rrcfp=8a172a1a&x-expires=1777776825&x-signature=YtZdy7TOIG6anAi9acK8l4ieCqE%3D" alt="小狗贴贴">
        
        <p class="question">可以成为我的宝宝吗？</p>
        <div class="buttons">
            <button class="btn btn-yes" id="yesBtn">可以</button>
            <button class="btn btn-no" id="noBtn">不要</button>
        </div>
    </div>

    <div class="success" id="success">我就知道你会同意！❤️</div>
    <img class="cry-img-full" id="cryImg" src="https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/9e8b435320ac42799444083108b1d7ba.jpeg~tplv-a9rns2rl98-image.png?lk3s=8e244e95&rcl=202604271803038424A005BCAD9C120303&rrcfp=dafada99&x-expires=2093508183&x-signature=Jc3V2a8rms%2BIsK0sLjfd54zaBLE%3D" alt="对不起小狗">

    <script>
        // 检测是否是微信环境
        function isWeChat() {
            return /MicroMessenger/i.test(navigator.userAgent);
        }

        // 全局变量
        const noTexts = ["不要","你认真的吗？","你要不要再想想！","不要选这个","事不过三，我放弃了"];
        let clickCount = 0;
        let isFinalText = false;
        let isNoMusicPlayed = false;
        
        // 获取元素
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainImg = document.getElementById('mainImg');
        const mainContainer = document.getElementById('main');
        const successDiv = document.getElementById('success');
        const cryImg = document.getElementById('cryImg');
        const yesMusic = document.getElementById('yesMusic');
        const noMusic = document.getElementById('noMusic');
        const wechatTip = document.getElementById('wechatTip');
        
        // 图片地址
        const yesImgUrl = "https://p11-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/bc64b5148e194fe38ad97c3bc479fa61.jpeg~tplv-a9rns2rl98-24:720:720.jpeg?lk3s=8e244e95&rcl=20260426104121CD7CF05DD3BD2787BAF2&rrcfp=8a172a1a&x-expires=1777776082&x-signature=kYfIVPWice7vCZXmuEicvdghr7Y%3D";

        // 微信适配：强制通过用户点击播放音频
        function playMusicInWechat(audioEl) {
            // 停止另一个音乐
            const otherAudio = audioEl === yesMusic ? noMusic : yesMusic;
            otherAudio.pause();
            otherAudio.currentTime = 0;

            // 微信下强制设置
            audioEl.loop = true;
            audioEl.volume = 0.6; // 微信下音量稍大一点更明显
            
            // 核心：通过用户点击直接触发（去掉异步包装，微信认直接点击）
            try {
                audioEl.play();
            } catch (e) {
                // 兜底：再次尝试（微信偶尔第一次点击失败）
                setTimeout(() => {
                    audioEl.play();
                }, 100);
            }
        }

        // 同意按钮点击事件（微信适配版）
        yesBtn.addEventListener('click', function() {
            // 先播放音乐，再执行原有逻辑
            playMusicInWechat(yesMusic);
            
            mainImg.src = yesImgUrl;
            mainImg.style.width = "280px";
            document.querySelector('.buttons').style.display = 'none';
            document.querySelector('.question').style.display = 'none';
            successDiv.style.display = 'block';
        });

        // 拒绝按钮点击事件（微信适配版）
        noBtn.addEventListener('click', function() {
            // 首次点击播放拒绝音乐
            if (!isNoMusicPlayed) {
                playMusicInWechat(noMusic);
                isNoMusicPlayed = true;
            }

            // 原有逻辑
            if (!isFinalText) {
                clickCount++;
                noBtn.innerText = noTexts[clickCount];
                
                let currentSize = parseInt(window.getComputedStyle(yesBtn).fontSize);
                yesBtn.style.fontSize = (currentSize + 3) + "px";
                yesBtn.style.padding = (12 + clickCount*2) + "px " + (30 + clickCount*4) + "px";
                
                if (clickCount === noTexts.length - 1) {
                    isFinalText = true;
                }
            } else {
                mainContainer.classList.add('hidden');
                cryImg.style.display = 'block';
                document.body.style.background = '#fadadd';
            }
        });

        // 页面加载后：微信环境显示提示
        window.onload = function() {
            if (isWeChat()) {
                wechatTip.style.display = 'block';
            }
            // 预加载音频（微信下提前加载，避免点击时卡顿）
            yesMusic.load();
            noMusic.load();
        };

        // 微信兼容：禁止浏览器默认行为干扰
        document.addEventListener('touchstart', function(e) {}, { passive: true });
    </script>
</body>
</html>
