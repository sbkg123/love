<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>可以成为我的宝宝吗？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background-color: #fadadd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            touch-action: manipulation;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .love-img {
            width: 220px;
            border-radius: 12px;
            margin-bottom: 35px;
        }
        .cry-img-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background-color: #fadadd;
            display: none;
            z-index: 999;
        }
        .question {
            font-size: 24px;
            color: #333;
            margin-bottom: 40px;
        }
        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-yes {
            background-color: #d9534f;
            color: white;
        }
        .btn-no {
            background-color: #428bca;
            color: white;
        }
        .success {
            display: none;
            font-size: 28px;
            color: #d9534f;
            font-weight: bold;
            margin-top: 20px;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        audio {
            position: fixed;
            bottom: 20px;
            left: 20px;
            opacity: 0;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <!-- 替换成sendfile.cc复制的【同意音乐直接外链】 -->
    <audio id="yesMusic" loop preload="auto" x5-playsinline playsinline webkit-playsinline>
        <source src="https://sendfile.cc/upload/639128584687309593.mp3" type="audio/mpeg">
    </audio>
    <!-- 替换成sendfile.cc复制的【拒绝音乐直接外链】 -->
    <audio id="noMusic" loop preload="auto" x5-playsinline playsinline webkit-playsinline>
        <source src="https://sendfile.cc/file/你的拒绝音乐ID/sad.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="main">
        <img class="love-img" id="mainImg" src="https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/5e40fc94904d419fa3a724ba1dd602cc.jpeg~tplv-a9rns2rl98-24:720:720.jpeg?lk3s=8e244e95&rcl=20260426105345A86DEEB4EB76433EAF4F&rrcfp=8a172a1a&x-expires=1777776825&x-signature=YtZdy7TOIG6anAi9acK8l4ieCqE%3D" alt="小狗贴贴">
        <p class="question">可以成为我的宝宝吗？</p>
        <div class="buttons">
            <button class="btn btn-yes" id="yesBtn">可以</button>
            <button class="btn btn-no" id="noBtn">不要</button>
        </div>
    </div>

    <div class="success" id="success">我就知道你会同意！❤️</div>
    <img class="cry-img-full" id="cryImg" src="https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/9e8b435320ac42799444083108b1d7ba.jpeg~tplv-a9rns2rl98-image.png?lk3s=8e244e95&rcl=202604271803038424A005BCAD9C120303&rrcfp=dafada99&x-expires=2093508183&x-signature=Jc3V2a8rms%2BIsK0sLjfd54zaBLE%3D" alt="对不起小狗">

    <script>
        const noTexts = ["不要","你认真的吗？","你要不要再想想！","不要选这个","事不过三，我放弃了"];
        let clickCount = 0, isFinalText = false, isNoMusicPlayed = false;
        
        const yesBtn = document.getElementById('yesBtn'), noBtn = document.getElementById('noBtn');
        const mainImg = document.getElementById('mainImg'), mainContainer = document.getElementById('main');
        const successDiv = document.getElementById('success'), cryImg = document.getElementById('cryImg');
        const yesMusic = document.getElementById('yesMusic'), noMusic = document.getElementById('noMusic');
        const yesImgUrl = "https://p11-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/bc64b5148e194fe38ad97c3bc479fa61.jpeg~tplv-a9rns2rl98-24:720:720.jpeg?lk3s=8e244e95&rcl=20260426104121CD7CF05DD3BD2787BAF2&rrcfp=8a172a1a&x-expires=1777776082&x-signature=kYfIVPWice7vCZXmuEicvdghr7Y%3D";

        // 微信专属播放逻辑（无多余包装，确保触发）
        function playTargetMusic(targetAudio) {
            const otherAudio = targetAudio === yesMusic ? noMusic : yesMusic;
            otherAudio.pause();
            otherAudio.currentTime = 0;
            
            targetAudio.loop = true;
            targetAudio.volume = 0.6;
            targetAudio.play(); // 微信直接识别该操作
        }

        // 同意按钮
        yesBtn.onclick = function() {
            playTargetMusic(yesMusic);
            mainImg.src = yesImgUrl;
            mainImg.style.width = "280px";
            document.querySelector('.buttons').style.display = 'none';
            document.querySelector('.question').style.display = 'none';
            successDiv.style.display = 'block';
        };

        // 拒绝按钮
        noBtn.onclick = function() {
            if (!isNoMusicPlayed) {
                playTargetMusic(noMusic);
                isNoMusicPlayed = true;
            }
            if (!isFinalText) {
                clickCount++;
                noBtn.innerText = noTexts[clickCount];
                const currentSize = parseInt(window.getComputedStyle(yesBtn).fontSize);
                yesBtn.style.fontSize = (currentSize + 3) + "px";
                yesBtn.style.padding = (12 + clickCount*2) + "px " + (30 + clickCount*4) + "px";
                if (clickCount === noTexts.length - 1) isFinalText = true;
            } else {
                mainContainer.classList.add('hidden');
                cryImg.style.display = 'block';
            }
        };

        // 预加载音频（避免微信点击卡顿）
        window.onload = () => {
            yesMusic.load();
            noMusic.load();
        };
    </script>
</body>
</html>
